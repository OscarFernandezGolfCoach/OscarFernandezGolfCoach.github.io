<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Oscar Fernandez Godoy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css?v=1.1"> </head>
<body>

  <img class="bg-image" src="f76ebeaf-b8f3-463c-85b0-687c1dfebec1.jpg" alt="">

  <div class="page">
    <header>
      <h1>Oscar Fernandez Godoy</h1>
      <p class="subtitle">Técnico Profesional de Golf</p>
      <a href="https://instagram.com/Oscargodoys" target="_blank">@Oscargodoys</a>
    </header>

    <section class="sobre-mi">
      <h2>Sobre mí</h2>
      <p>Soy técnico profesional de golf con experiencia en formación y desarrollo de jugadores.</p>
    </section>

    <div class="accordion">
      <button class="accordion-btn">Palmarés</button>
      <div class="accordion-content">
        <p>🏆 Logro 1<br>🏆 Logro 2</p>
      </div>
    </div>

    <footer class="footer">
      <p>© 2026 Oscar Fernandez Godoy</p>
    </footer>
  </div>

  <script>
    document.querySelectorAll(".accordion-btn").forEach(btn => {
      btn.onclick = function() {
        const content = this.nextElementSibling;
        if (content.style.maxHeight) {
          content.style.maxHeight = null;
        } else {
          content.style.maxHeight = content.scrollHeight + "px";
        }
      }
    });
  </script>
</body>
</html>
